entry: verify
steps:
  verify:
    type: parallel
    branches:
      - name: lint
        type: shell
        commands:
          - .venv/bin/python -m ruff check loom/ tests/ || echo "ruff not installed, skip"
          - .venv/bin/python -m py_compile loom/cli.py loom/executor.py loom/nodes/parallel.py
      - name: test
        type: shell
        commands:
          - .venv/bin/python -m pytest tests/ -q
      - name: typecheck
        type: shell
        commands:
          - .venv/bin/python -m mypy loom/ || echo "mypy not installed, skip"
    on_pass: done
    on_fail: fix

  done:
    type: log
    message: "Pipeline completed successfully at {{timestamp}}"
    file: loom.log

  fix:
    type: agent
    agent: hermes
    prompt: "The parallel verification pipeline failed. Check the outputs in shared_state (lint_output, test_output, typecheck_output) and suggest fixes. Reply PASS if no issues, FAIL with specific fixes needed."
    pass_keyword: PASS
    on_pass: verify
    on_fail: human_review
    max_visits: 3

  human_review:
    type: human
    on_approve: done
    on_decline: abort

  abort:
    type: shell
    commands:
      - echo "Pipeline aborted by human"
