# Edge case: max_visits loop prevention
# loop → check(True) → loop → check(True) → loop → ERROR (max_visits=2)
entry: loop
steps:
  loop:
    type: shell
    commands:
      - 'echo "loop iteration"'
    next: check
    max_visits: 2
  check:
    type: condition
    expression: "True"
    on_true: loop
    on_false: done
  done:
    type: shell
    commands:
      - 'echo "done"'
