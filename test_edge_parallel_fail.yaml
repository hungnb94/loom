# Edge case: parallel fail → routes to on_fail
entry: parallel_fail
steps:
  parallel_fail:
    type: parallel
    branches:
      - name: ok
        type: shell
        commands:
          - 'echo "ok"'
      - name: fail
        type: shell
        commands:
          - 'exit 1'
    on_pass: done
    on_fail: error_handler
  error_handler:
    type: shell
    commands:
      - 'echo "parallel failed, caught by error_handler"'
    next: done
  done:
    type: shell
    commands:
      - 'echo "finished"'
